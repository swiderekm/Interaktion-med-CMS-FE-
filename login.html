<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in - BookDucks</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://kit.fontawesome.com/bc3658d4a6.js" crossorigin="anonymous"></script>
    <script src="js/account.js"  defer></script>
    <script src="js/theme.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Logga in</h1>
            <p>Välkommen tillbaka till BookDucks</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="identifier">E-post eller användarnamn</label>
                    <input type="text" id="identifier" required>
                </div>

                <div class="form-group">
                    <label for="password">Lösenord</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn btn-primary full-width">Logga in</button>
            </form>

            <p class="switch-auth">
                Har du inget konto? 
                <a href="register.html">Registrera dig här</a>
            </p>

            <div id="login-message" class="message"></div>
        </div>
    </div>
    <script src="js/index.js"></script>
</body>
</html>
