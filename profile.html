<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - BookDucks</title>
    <script src="https://kit.fontawesome.com/bc3658d4a6.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/theme.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="left-nav">
                <div class="logo">
                    <h2>🦆 BookDucks</h2>
                </div>
                
                <div class="nav-links">
                    <a href="index.html">
                        <i class="fa-solid fa-house"></i> Hem
                    </a>
                </div>
            </div>

            <div class="auth-buttons">
                <div id="user-nav">
                    <span id="welcome-user" class="welcome-text">Hej, Mikolaj!</span>
                    <a href="profile.html" class="btn btn-secondary">
                        <i class="fa-solid fa-user"></i> Profil
                    </a>
                    <button id="logout-btn" class="btn btn-danger">Logga ut</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="profile-header">
            <div class="profile-avatar">
                👤
            </div>
            <div>
                <h1 id="profile-name">USER</h1>
                <p id="profile-email">USER</p>
            </div>
        </div>

        <div class="profile-content">

            <div class="profile-card">
                <h2>Min Läslista</h2>
                <p>Du har <strong id="book-count">0</strong> böcker i din läslista.</p>

                <div class="sort-controls">
                    <span>Sortera efter:</span>
                    <button class="btn btn-sort active" data-sort="title">Titel</button>
                    <button class="btn btn-sort" data-sort="author">Författare</button>
                </div>

                <div id="readlist-container" class="books-grid"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 BookDucks</p>
        </div>
    </footer>

    <script src="js/account.js"></script>
    <!-- <script src="js/index.js"></script> -->
    <script src="js/profile.js"></script>
</body>
</html>
