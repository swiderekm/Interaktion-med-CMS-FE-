<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrera - BookDucks</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://kit.fontawesome.com/bc3658d4a6.js" crossorigin="anonymous"></script>
    <script src="js/account.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Skapa konto</h1>
            <p>Bli medlem hos BookDucks</p>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Användarnamn</label>
                    <input type="text" id="username" required>
                </div>

                <div class="form-group">
                    <label for="email">E-post</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Lösenord</label>
                    <input type="password" id="password" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary full-width">Registrera</button>
            </form>

            <p class="switch-auth">
                Har du redan ett konto? 
                <a href="login.html">Logga in här</a>
            </p>

            <div id="register-message" class="message"></div>
        </div>
    </div>
</body>
</html>
